default: &default
  adapter: postgresql
  encoding: utf8
  host: localhost
  port: 5432
  pool: 5
  username: postgres
  password: postgres

development: &development
  primary:
    <<: *default
    database: ticketing_app_development
  cache:
    <<: *default
    database: ticketing_app_development_cache
    migrations_paths: db/cache_migrate
    schema_dump: cache_structure.sql

test: &test
  primary:
    <<: *default
    database: ticketing_app_test
  cache:
    <<: *default
    database: ticketing_app_test_cache
    migrations_paths: db/cache_migrate
    schema_dump: cache_structure.sql

production:
  primary: &primary
    <<: *default
    host: <%= ENV.fetch('TICKETING_DB_HOST', '127.0.0.1') %>
    port: <%= ENV.fetch('TICKETING_DB_PORT', '5432') %>
    username: <%= ENV.fetch('TICKETING_DB_USER', 'fnf') %>
    password: <%= ENV.fetch('TICKETING_DB_PASS', '') %>
    database: <%= ENV.fetch('TICKETING_DB_NAME', 'ticketing_app_production') %>
    pool: 10
  cache:
    <<: *primary
    database: <%= "#{ENV.fetch('TICKETING_DB_NAME', 'ticketing_app_production')}_cache" %>
    migrations_paths: db/cache_migrate
    schema_dump: cache_structure.sql
